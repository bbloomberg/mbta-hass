  <!-- Roundel -->
  <g>
    <circle cx="60" cy="60" r="48" fill="#11151f" stroke="#1c2230" stroke-width="2"/>
    <g fill="none" stroke-width="12" stroke-linecap="butt">
      <path d="M 30.98 30.98 A 41 41 0 0 1 89.02 30.98" stroke="#DA291C"/>
      <path d="M 89.02 30.98 A 41 41 0 0 1 89.02 89.02" stroke="#ED8B00"/>
      <path d="M 89.02 89.02 A 41 41 0 0 1 30.98 89.02" stroke="#00843D"/>
      <path d="M 30.98 89.02 A 41 41 0 0 1 30.98 30.98" stroke="#003DA5"/>
    </g>
    <g stroke="#11151f" stroke-width="3" stroke-linecap="round">
      <line x1="30.98" y1="30.98" x2="36" y2="36"/>
      <line x1="89.02" y1="30.98" x2="84" y2="36"/>
      <line x1="89.02" y1="89.02" x2="84" y2="84"/>
      <line x1="30.98" y1="89.02" x2="36" y2="84"/>
    </g>
    <g fill="#ffffff">
