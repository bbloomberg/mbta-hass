      <rect x="55" y="44" width="10" height="34" rx="2.5"/>
    </g>
  </g>
  <!-- Wordmark -->
  <text x="132" y="76" font-family="'Helvetica Neue',Arial,sans-serif" font-size="56" font-weight="800" letter-spacing="3" fill="#ffffff">MBTA</text>
</svg>
