<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" width="360" height="120" role="img" aria-label="MBTA for Home Assistant">
  <title>MBTA</title>
  <!-- Self-contained dark panel so the wordmark is legible on any background -->
